<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5;url=/">
    <link rel="canonical" href="https://www.knightgroup.com/404">
    <title>Page Not Found - Redirecting</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/Images/android-chrome-512x512.png" type="image/png">
    <style>
        /* CLS: reserve header height before JS injects */
        #header-include { min-height: 74px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
        }
        img { max-width: 200px; height: auto; margin-bottom: 24px; }
        h1 { font-size: 2rem; color: #800000; margin-bottom: 12px; }
        p { color: #555; margin-bottom: 20px; }
        a { color: #800000; font-weight: 600; }
    </style>

    <script>
        // Define URL mappings for old .html pages
        var redirects = {
            "/index.html": "/",
            "/about.html": "/about",
            "/contact.html": "/contact",
            "/Services/handyman.html": "/Services/handyman",
            "/PolicyPages/returnpolicy.html": "/PolicyPages/returnpolicy",
            "/PolicyPages/privacy-policy.html": "/PolicyPages/privacy-policy",
            "/PolicyPages/terms.html": "/PolicyPages/terms"
        };

        // Get the current path
        var path = window.location.pathname;

        // Redirect if it matches a known old URL
        if (redirects[path]) {
            window.location.replace(redirects[path]);
        } else {
            // If the page is not found, redirect to the homepage
            window.location.replace("/");
        }
    </script>
</head>
<body>
    <div class="container">
    <img src="/Images/KnightGroupLogo.webp" alt="Knight Group Logo">
    <h1>Oops! Page Not Found</h1>
    <p>You will be redirected to the homepage shortly. If not, <a href="/">click here</a>.</p>
    </div>
</body>
</html>
