<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5;url=/">
    <link rel="canonical" href="https://www.knightgroup.com/404">
    <title>Page Not Found - Redirecting</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/Images/android-chrome-512x512.png" type="image/png">
    <style>
        /* CLS: reserve header height before JS injects */
        #header-include { min-height: 74px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
        }
        img { max-width: 200px; height: auto; margin-bottom: 24px; }
        h1 { font-size: 2rem; color: #9a2f2f; margin-bottom: 12px; }
        p { color: #555; margin-bottom: 20px; }
        a { color: #9a2f2f; font-weight: 600; }
    </style>

    <script>
        var path = window.location.pathname || '';
        var search = window.location.search || '';
        var hash = window.location.hash || '';

        if (/\.html$/i.test(path)) {
            var cleanPath = path.replace(/\/index\.html$/i, '/').replace(/\.html$/i, '');
            window.location.replace((cleanPath || '/') + search + hash);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body>
    <div class="container">
    <img src="/Images/KnightGroupLogo.webp" alt="Knight Group Logo">
    <h1>Oops! Page Not Found</h1>
    <p>You will be redirected to the homepage shortly. If not, <a href="index.html">click here</a>.</p>
    </div>
</body>
</html>
